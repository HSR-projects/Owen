#
# Self-play training configuration.
# Defaults are a SMOKE-TEST profile that runs end-to-end quickly on CPU / a small
# GPU so you can verify the whole loop works. Scale the marked values up for real
# strength (see README "Scaling up").

seed: 0
use_cuda: true            # falls back to CPU automatically if no GPU
weights_dir: ../weights

# ── Network size ──  (scale up: channels 128-256, blocks 10-40)
channels: 64
blocks: 6

# ── Native NNUE evaluator ──
nnue_enabled: true
nnue_hidden: 128
nnue_loss_weight: 0.25
nnue_resume: null

# ── Self-play / MCTS ──
iterations: 5             # scale up: hundreds-thousands
games_per_iter: 8         # scale up: hundreds (parallelise across workers)
simulations: 60           # scale up: 400-800
eval_simulations: 40
temperature_moves: 20     # sample moves before this ply, argmax after
max_moves: 120
c_puct: 1.5
dirichlet_alpha: 0.3
dirichlet_eps: 0.25

# ── Optimisation ──
buffer_capacity: 50000    # scale up: 1-2 million
batch_size: 256
train_steps: 200          # gradient steps per iteration
lr: 0.001
l2: 0.0001
grad_clip: 5.0

# ── Gating (candidate vs best) ──
gate_interval: 2          # run an arena every N iterations (0 = off)
gate_games: 12
gate_threshold: 0.55      # promote candidate if it scores >= this

# ── Optional resume ──
resume: null              # path to a .pt checkpoint to continue from
