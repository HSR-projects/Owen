#
# Strong CUDA continuation profile. This keeps the current network shape so it
# can resume from weights/owen_latest.pt and weights/owen_nnue_latest.pt.

seed: 7
use_cuda: true
use_amp: true
weights_dir: ../weights

# Must match the existing checkpoint when resume is set.
channels: 64
blocks: 6

nnue_enabled: true
nnue_hidden: 128
nnue_loss_weight: 0.35
nnue_resume: ../weights/owen_nnue_latest.pt

# Stronger self-play. Raise these again only after the run is stable overnight.
iterations: 200
games_per_iter: 24
simulations: 160
eval_simulations: 96
temperature_moves: 18
max_moves: 180
c_puct: 1.7
dirichlet_alpha: 0.3
dirichlet_eps: 0.18

# Larger replay/training budget for GPU.
buffer_capacity: 500000
batch_size: 512
train_steps: 600
lr: 0.0005
l2: 0.0001
grad_clip: 5.0

# Gate less noisily than the tiny smoke profile.
gate_interval: 10
gate_games: 40
gate_threshold: 0.53

resume: ../weights/owen_latest.pt
