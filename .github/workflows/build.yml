name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  windows:
    name: Windows (x64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc make
      - name: Build owen.exe
        run: cd engine && make win-native
      - name: Smoke test (perft)
        run: cd engine && ./owen.exe bench
      - uses: actions/upload-artifact@v4
        with:
          name: owen-windows-x64
          path: engine/owen.exe

  linux:
    name: Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build owen
        run: cd engine && make ARCH=-mavx2
      - name: Smoke test (perft)
        run: cd engine && ./owen bench
      - uses: actions/upload-artifact@v4
        with:
          name: owen-linux-x64
          path: engine/owen
