name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  windows:
    name: Windows (x64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc make
      - name: Build owen.exe
        run: cd engine && make win-native
      - name: Smoke test (perft)
        run: cd engine && ./owen.exe bench
      - uses: actions/upload-artifact@v4
        with:
          name: owen-windows-x64
          path: engine/owen.exe

  linux:
    name: Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build owen
        run: cd engine && make ARCH=-mavx2
      - name: Smoke test (perft)
        run: cd engine && ./owen bench
      - uses: actions/upload-artifact@v4
        with:
          name: owen-linux-x64
          path: engine/owen

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Assemble release assets (binaries + NNUE network)
        run: |
          mkdir -p out
          cp dist/owen-windows-x64/owen.exe out/owen.exe
          cp dist/owen-linux-x64/owen     out/owen-linux-x64
          curl -L -o out/nn-62ef826d1a6d.nnue \
            https://github.com/official-stockfish/networks/raw/master/nn-62ef826d1a6d.nnue
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            out/owen.exe out/owen-linux-x64 out/nn-62ef826d1a6d.nnue \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Owen ${GITHUB_REF_NAME}" \
            --notes "Owen chess engine ${GITHUB_REF_NAME}.

          **Windows:** download \`owen.exe\` and \`nn-62ef826d1a6d.nnue\` into the same folder, then point your GUI at \`owen.exe\`.
          **Linux:** download \`owen-linux-x64\` (chmod +x) and the network into the same folder.

          Recommended UCI options: set \`Threads\` to your core count; optionally set \`SyzygyPath\` to a Syzygy tablebase folder. Built statically (AVX2)."
